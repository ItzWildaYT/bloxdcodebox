<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bloxd CodeBox IDE</title>
<style>
html,body{
margin:0;
height:100%;
background:#0b0b0b;
color:#e5e5e5;
font-family:Inter,Segoe UI,Arial;
overflow:hidden
}
#app{
display:flex;
flex-direction:column;
height:100%
}
#topbar{
height:52px;
background:#111;
display:flex;
align-items:center;
padding:0 20px;
border-bottom:1px solid #1f1f1f;
gap:12px
}
#brand{
font-weight:600;
font-size:15px
}
.button{
background:#1a1a1a;
border:1px solid #262626;
color:#fff;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-size:12px
}
.button:hover{background:#222}
#dropdown{
position:relative
}
#dropdownMenu{
position:absolute;
top:40px;
left:0;
background:#111;
border:1px solid #222;
display:none;
flex-direction:column;
min-width:180px;
z-index:10
}
.dropdownItem{
padding:8px 12px;
cursor:pointer;
font-size:12px
}
.dropdownItem:hover{background:#222}
#tabs{
height:38px;
background:#0f0f0f;
display:flex;
align-items:center;
border-bottom:1px solid #1f1f1f;
overflow-x:auto
}
.tab{
padding:6px 14px;
font-size:12px;
cursor:pointer;
border-right:1px solid #1f1f1f
}
.tab.active{background:#1a1a1a}
#main{
flex:1;
display:flex;
overflow:hidden
}
#editor{
flex:1
}
#errorPanel{
width:320px;
background:#0e0e0e;
border-left:1px solid #1f1f1f;
display:flex;
flex-direction:column
}
#errorHeader{
padding:10px;
font-size:12px;
border-bottom:1px solid #1f1f1f
}
#errorList{
flex:1;
overflow:auto;
font-size:12px;
padding:10px
}
.errorItem{
margin-bottom:6px;
color:#ff6b6b
}
#footer{
height:28px;
background:#111;
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
border-top:1px solid #1f1f1f
}
</style>
</head>
<body>

<div id="app">
<div id="topbar">
<div id="brand">Bloxd CodeBox IDE</div>
<button class="button" id="newFile">New File</button>
<button class="button" id="saveAll">Save</button>

<div id="dropdown">
<button class="button" id="toolsBtn">Tools ▾</button>
<div id="dropdownMenu">
<div class="dropdownItem" id="minifyBtn">Minimize JS</div>
<div class="dropdownItem" id="optimizeBtn">Optimize</div>
</div>
</div>

<div style="margin-left:auto;font-size:12px" id="charCount">0 / 16000</div>
</div>

<div id="tabs"></div>

<div id="main">
<div id="editor"></div>
<div id="errorPanel">
<div id="errorHeader">Errors</div>
<div id="errorList"></div>
</div>
</div>

<div id="footer">© BloxdZeno</div>
</div>

<script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script>

require.config({paths:{vs:'https://unpkg.com/monaco-editor@0.45.0/min/vs'}})

let editor
let files={}
let currentFile=null
const MAX_CHARS=16000

function saveToStorage(){
localStorage.setItem("bloxd_files",JSON.stringify(files))
}

function loadFromStorage(){
const data=localStorage.getItem("bloxd_files")
if(data) files=JSON.parse(data)
else files={"main.js":""}
}

function renderTabs(){
const tabs=document.getElementById("tabs")
tabs.innerHTML=""
Object.keys(files).forEach(name=>{
const t=document.createElement("div")
t.className="tab"+(name===currentFile?" active":"")
t.textContent=name
t.onclick=()=>switchFile(name)
tabs.appendChild(t)
})
}

function switchFile(name){
currentFile=name
editor.setValue(files[name])
renderTabs()
updateCount()
}

function newFile(){
let name="file"+Object.keys(files).length+".js"
files[name]=""
currentFile=name
renderTabs()
editor.setValue("")
saveToStorage()
}

function updateCount(){
const len=editor.getValue().length
document.getElementById("charCount").textContent=len+" / "+MAX_CHARS
if(len>MAX_CHARS){
editor.setValue(editor.getValue().slice(0,MAX_CHARS))
}
}

function minifyJS(code){
return code
.replace(/\/\/.*$/gm,"")
.replace(/\s+/g," ")
.replace(/\s*([\{\}\(\)\=\;\,\+\-\*\/])\s*/g,"$1")
.trim()
}

function optimizeJS(code){
let optimized=code
optimized=minifyJS(optimized)
optimized=optimized.replace(/var /g,"let ")
optimized=optimized.replace(/==/g,"===")
optimized=optimized.replace(/!=/g,"!==")
return optimized
}

function updateErrors(){
const model=editor.getModel()
const markers=monaco.editor.getModelMarkers({resource:model.uri})
const list=document.getElementById("errorList")
list.innerHTML=""
markers.forEach(m=>{
const div=document.createElement("div")
div.className="errorItem"
div.textContent="Line "+m.startLineNumber+": "+m.message
list.appendChild(div)
})
}

require(['vs/editor/editor.main'],()=>{

monaco.languages.typescript.javascriptDefaults.setCompilerOptions({
target:monaco.languages.typescript.ScriptTarget.ES2020,
allowNonTsExtensions:true,
checkJs:true,
strict:true
})

editor=monaco.editor.create(document.getElementById("editor"),{
value:"",
language:"javascript",
theme:"vs-dark",
automaticLayout:true,
minimap:{enabled:false},
fontSize:14,
quickSuggestions:true,
suggestOnTriggerCharacters:true,
parameterHints:{enabled:true},
autoClosingBrackets:"always"
})

editor.onDidChangeModelContent(()=>{
files[currentFile]=editor.getValue()
updateCount()
saveToStorage()
updateErrors()
})

loadFromStorage()
currentFile=Object.keys(files)[0]
renderTabs()
switchFile(currentFile)

})

document.getElementById("newFile").onclick=newFile
document.getElementById("saveAll").onclick=saveToStorage

document.getElementById("toolsBtn").onclick=()=>{
const menu=document.getElementById("dropdownMenu")
menu.style.display=menu.style.display==="flex"?"none":"flex"
}

document.getElementById("minifyBtn").onclick=()=>{
editor.setValue(minifyJS(editor.getValue()))
}

document.getElementById("optimizeBtn").onclick=()=>{
editor.setValue(optimizeJS(editor.getValue()))
}

</script>
</body>
</html>
