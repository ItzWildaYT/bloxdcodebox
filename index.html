<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bloxd Enterprise Cloud IDE</title>
<style>
html,body{
margin:0;
height:100%;
background:#0c0c0c;
color:#e6e6e6;
font-family:Inter,Segoe UI,Arial;
overflow:hidden
}
#layout{
display:flex;
flex-direction:column;
height:100%
}
#topbar{
height:48px;
background:#111;
display:flex;
align-items:center;
padding:0 20px;
border-bottom:1px solid #1e1e1e
}
#brand{
font-weight:600;
letter-spacing:.5px;
font-size:15px
}
#status{
margin-left:auto;
font-size:12px;
opacity:.7
}
#main{
flex:1;
display:flex;
overflow:hidden
}
#sidebar{
width:260px;
background:#0f0f0f;
border-right:1px solid #1e1e1e;
display:flex;
flex-direction:column
}
#apiList{
flex:1;
overflow:auto;
padding:10px
}
.apiItem{
padding:6px 8px;
font-size:12px;
cursor:pointer;
border-radius:6px
}
.apiItem:hover{
background:#1a1a1a
}
#editorContainer{
flex:1;
position:relative
}
#editor{
position:absolute;
inset:0
}
</style>
</head>
<body>
<div id="layout">
<div id="topbar">
<div id="brand">Bloxd Enterprise Cloud IDE</div>
<div id="status">Booting...</div>
</div>
<div id="main">
<div id="sidebar">
<div id="apiList"></div>
</div>
<div id="editorContainer">
<div id="editor"></div>
</div>
</div>
</div>

<script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script>

require.config({paths:{vs:'https://unpkg.com/monaco-editor@0.45.0/min/vs'}})

const REPO_ROOT="https://api.github.com/repos/Bloxdy/code-api/contents"
const CACHE_KEY="bloxd_enterprise_v3_cache"

async function crawlRepo(path=""){
const url=path?`${REPO_ROOT}/${path}`:REPO_ROOT
const res=await fetch(url)
if(!res.ok) throw new Error("GitHub API error")
const entries=await res.json()
let files=[]
for(const entry of entries){
if(entry.type==="file" && entry.name.endsWith(".md")) files.push(entry.download_url)
if(entry.type==="dir"){
const nested=await crawlRepo(entry.path)
files=files.concat(nested)
}
}
return files
}

async function fetchMarkdown(){
if(localStorage.getItem(CACHE_KEY)) return localStorage.getItem(CACHE_KEY)
const files=await crawlRepo()
let combined=""
for(const file of files){
const r=await fetch(file+"?"+Date.now())
combined+=await r.text()+"\n"
}
localStorage.setItem(CACHE_KEY,combined)
return combined
}

function buildAPIIndex(markdown){

const lines=markdown.split("\n")
const methods={}
const callbacks={}
let docBuffer=[]

function commitMethod(name,params){
if(!methods[name]){
methods[name]={
name,
params,
doc:docBuffer.join(" ").trim(),
returns:"any"
}
}
docBuffer=[]
}

for(let line of lines){

let trimmed=line.trim()

if(trimmed.startsWith("##")||trimmed.startsWith("###")) docBuffer=[]

if(trimmed.length>0 && !trimmed.startsWith("```")) docBuffer.push(trimmed)

let match1=trimmed.match(/api\.(\w+)\((.*?)\)/)
if(match1){
commitMethod(match1[1],parseParams(match1[2]))
continue
}

let match2=trimmed.match(/^(\w+)\((.*?)\)/)
if(match2){
let name=match2[1]
if(name.startsWith("on")){
callbacks[name]={name,doc:docBuffer.join(" ").trim()}
}else{
commitMethod(name,parseParams(match2[2]))
}
continue
}
}

return {methods:Object.values(methods),callbacks:Object.values(callbacks)}
}

function parseParams(raw){
return raw.split(",").map(p=>{
let clean=p.trim()
if(!clean) return null
return {name:clean.split(":")[0].trim(),type:"any"}
}).filter(Boolean)
}

function generateDTS(index){
let out="declare const api:{\n"
for(const m of index.methods){
out+=`
/** ${m.doc||"Bloxd API Method"} */
${m.name}(${m.params.map(p=>p.name+": "+p.type).join(", ")}): ${m.returns}
`
}
out+="}\n\n"
for(const cb of index.callbacks){
out+=`declare function ${cb.name}(playerId:string):void\n`
}
return out
}

function populateSidebar(index,editor){
const list=document.getElementById("apiList")
list.innerHTML=""
index.methods.forEach(m=>{
const div=document.createElement("div")
div.className="apiItem"
div.textContent=m.name
div.onclick=()=>{
editor.trigger("keyboard","type",{text:`api.${m.name}(`})
}
list.appendChild(div)
})
}

function registerCompletion(index){

monaco.languages.registerCompletionItemProvider("javascript",{
triggerCharacters:["."],
provideCompletionItems(model,pos){

const text=model.getValueInRange({
startLineNumber:pos.lineNumber,
startColumn:1,
endLineNumber:pos.lineNumber,
endColumn:pos.column
})

if(!text.includes("api.")) return {suggestions:[]}

const suggestions=index.methods.map(m=>{
const snippet=m.params.map((p,i)=>`\${${i+1}:${p.name}}`).join(", ")
return{
label:m.name,
kind:monaco.languages.CompletionItemKind.Method,
insertText:`${m.name}(${snippet})`,
insertTextRules:monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
documentation:m.doc||"Bloxd API Method"
}
})

return {suggestions}
}
})

monaco.languages.registerHoverProvider("javascript",{
provideHover(model,pos){
const word=model.getWordAtPosition(pos)
if(!word) return
const method=index.methods.find(m=>m.name===word.word)
if(!method) return
return{
contents:[
{value:`**${method.name}**`},
{value:method.doc||"Bloxd API Method"}
]
}
}
})

}

require(['vs/editor/editor.main'],async()=>{

monaco.languages.typescript.javascriptDefaults.setCompilerOptions({
target:monaco.languages.typescript.ScriptTarget.ES2020,
allowNonTsExtensions:true,
checkJs:true,
strict:true
})

document.getElementById("status").textContent="Fetching GitHub API..."

let markdown
try{
markdown=await fetchMarkdown()
}catch(e){
document.getElementById("status").textContent="GitHub API Failed"
return
}

const index=buildAPIIndex(markdown)
const dts=generateDTS(index)

monaco.languages.typescript.javascriptDefaults.addExtraLib(dts,"bloxd_api.d.ts")

const editor=monaco.editor.create(document.getElementById("editor"),{
value:"",
language:"javascript",
theme:"vs-dark",
automaticLayout:true,
fontSize:14,
minimap:{enabled:false},
quickSuggestions:true,
suggestOnTriggerCharacters:true,
parameterHints:{enabled:true},
autoClosingBrackets:"always"
})

populateSidebar(index,editor)
registerCompletion(index)

document.getElementById("status").textContent="Enterprise API Indexed ✓"

})

</script>
</body>
</html>
