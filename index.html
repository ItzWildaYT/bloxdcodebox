<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bloxd Community IDE</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
background:#1e1e1e;
color:white;
font-family:Arial
}

#top{
height:40px;
background:#111;
display:flex;
align-items:center;
padding:0 15px;
font-size:14px
}

#status{
margin-left:auto;
opacity:.7
}

#editor{
height:calc(100% - 40px)
}
</style>
</head>

<body>

<div id="top">
Bloxd Community IDE
<div id="status">Loading API...</div>
</div>

<div id="editor"></div>

<script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>

<script>
require.config({paths:{vs:"https://unpkg.com/monaco-editor@0.45.0/min/vs"}})

const CDN="https://cdn.jsdelivr.net/gh/Bloxdy/code-api@main/"

const FILES=[
"README.md",
"CALLBACKS.md",
"CLIENT_OPTIONS.md"
]

async function loadDocs(){

let cache=localStorage.getItem("bloxd_docs")

if(cache)return cache

let out=""

for(const f of FILES){

const r=await fetch(CDN+f)

if(!r.ok)continue

out+=await r.text()+"\n"
}

localStorage.setItem("bloxd_docs",out)

return out
}

function buildTypes(md){

const fn=/([a-zA-Z_][a-zA-Z0-9_]*)\s*\(([^)]*)\)/g

let api="declare const api:{\n"
let cb=""
let opts="declare interface ClientOptions{\n"

let m

while(m=fn.exec(md)){

const name=m[1]
const args=m[2]

if(name.startsWith("on")){
cb+=`declare function ${name}(${args}):void\n`
}
else if(name.startsWith("set")||name.startsWith("get")||name.match(/^[a-z]/)){
api+=`${name}(${args}):any\n`
}
}

const opt=/^\s*([a-zA-Z0-9_]+)\s*=\s*/gm

while(m=opt.exec(md)){
opts+=`${m[1]}:any\n`
}

api+="}\n"
opts+="}\n"

return`

declare const myId:string
declare const playerId:string

${api}

${cb}

${opts}

`
}

async function init(){

const status=document.getElementById("status")

let docs

try{
docs=await loadDocs()
status.textContent="API Loaded"
}catch{
status.textContent="API Load Failed"
docs=""
}

const defs=buildTypes(docs)

require(["vs/editor/editor.main"],()=>{

monaco.languages.typescript.javascriptDefaults.addExtraLib(
defs,
"bloxd.d.ts"
)

monaco.languages.typescript.javascriptDefaults.setCompilerOptions({
target:monaco.languages.typescript.ScriptTarget.ES2020,
allowNonTsExtensions:true,
noLib:true
})

monaco.editor.create(document.getElementById("editor"),{

value:
`tick = (ms)=>{

}

onPlayerJoin = (id)=>{

}

api.sendMessage(myId,"Hello World")
`,

language:"javascript",
theme:"vs-dark",
automaticLayout:true,
fontSize:14,
minimap:{enabled:false},
scrollBeyondLastLine:false

})

})
}

init()
</script>

</body>
</html>
