<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bloxd Community IDE</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
background:#1e1e1e;
color:white;
font-family:Arial
}

#top{
height:40px;
background:#111;
display:flex;
align-items:center;
padding:0 15px;
font-size:14px
}

#status{
margin-left:auto;
opacity:.7
}

#editor{
height:calc(100% - 40px)
}
</style>
</head>

<body>

<div id="top">
Bloxd Community IDE
<div id="status">Loading API...</div>
</div>

<div id="editor"></div>

<script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script>
let editor1;
let editor2;

require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.45.0/min/vs' } });

const CDN = "https://cdn.jsdelivr.net/gh/Bloxdy/code-api@main/";

const FILES = [
  "README.md",
  "CALLBACKS.md",
  "CLIENT_OPTIONS.md"
];

async function loadDocs(){

  let cached = localStorage.getItem("bloxd_api_docs");

  if(cached) return cached;

  let out = "";

  for(const f of FILES){

    const r = await fetch(CDN + f);

    if(!r.ok) continue;

    out += await r.text() + "\n";
  }

  localStorage.setItem("bloxd_api_docs", out);

  return out;
}

function buildTypes(md){

  const fn = /([a-zA-Z_][a-zA-Z0-9_]*)\s*\(([^)]*)\)/g;

  let api = "declare const api:{\n";
  let cb = "";

  let m;

  while(m = fn.exec(md)){

    const name = m[1];
    const args = m[2];

    if(name.startsWith("on")){
      cb += `declare function ${name}(${args}):void\n`;
    }else{
      api += `${name}(${args}):any\n`;
    }
  }

  api += "}\n";

  return `
declare const myId:string
declare const playerId:string

${api}

${cb}
`;
}

async function setupAPI(){

  const docs = await loadDocs();

  const defs = buildTypes(docs);

  monaco.languages.typescript.javascriptDefaults.addExtraLib(
    defs,
    "bloxd.d.ts"
  );

  monaco.languages.typescript.javascriptDefaults.setCompilerOptions({
    target: monaco.languages.typescript.ScriptTarget.ES2020,
    allowNonTsExtensions: true,
    noLib: true
  });
}

require(['vs/editor/editor.main'], async function () {

  await setupAPI();

  editor1 = monaco.editor.create(document.getElementById('editor1'), {
    value: "Write something here...",
    language: 'javascript',
    theme: 'vs-dark',
    automaticLayout: true,
    minimap:{enabled:false},
    fontSize:16,
    scrollBeyondLastLine:false
  });

  editor2 = monaco.editor.create(document.getElementById('editor2'), {
    value: "function world(){\n  console.log('World Code');\n}",
    language: 'javascript',
    theme: 'vs-dark',
    automaticLayout: true,
    minimap:{enabled:false},
    fontSize:16,
    scrollBeyondLastLine:false
  });
});

document.getElementById("openWorldCode").onclick = function(){
  document.getElementById("normalBoard").style.display="none";
  document.getElementById("codeBoard").style.display="block";
  setTimeout(()=>editor2.layout(),100);
};

document.getElementById("closeWorldCode").onclick = function(){
  document.getElementById("codeBoard").style.display="none";
  document.getElementById("normalBoard").style.display="block";
  setTimeout(()=>editor1.layout(),100);
};
</script>

</body>
</html>
